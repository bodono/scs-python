name: Free-threading tests

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  test_freethreading:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13t", "3.14t"]

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up free-threaded Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install OpenBLAS
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenblas-dev

      - name: Create venv and install dependencies
        run: |
          uv venv --python ${{ matrix.python-version }} .venv
          source .venv/bin/activate
          uv pip install numpy scipy pytest

      - name: Build and install scs
        run: |
          source .venv/bin/activate
          uv pip install -v .

      - name: Verify GIL is disabled
        run: |
          source .venv/bin/activate
          python -c "
          import sys
          import scs
          print(f'Python {sys.version}')
          print(f'GIL enabled: {sys._is_gil_enabled()}')
          assert not sys._is_gil_enabled(), 'GIL should be disabled in free-threaded build'
          print('Free-threading verified OK')
          "

      - name: Run tests
        run: |
          source .venv/bin/activate
          python -m pytest test/ -v --timeout=120
