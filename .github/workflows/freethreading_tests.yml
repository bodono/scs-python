name: Free-threading tests

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  test_freethreading:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13t", "3.14t"]

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up free-threaded Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install OpenBLAS
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenblas-dev

      - name: Create venv and install dependencies
        run: |
          uv venv --python ${{ matrix.python-version }} .venv
          source .venv/bin/activate
          uv pip install numpy scipy pytest pytest-run-parallel

      - name: Build and install scs
        run: |
          source .venv/bin/activate
          uv pip install -v .

      - name: Run tests
        run: |
          source .venv/bin/activate
          python -m pytest test/ -v -p no:faulthandler -o faulthandler_timeout=600

      - name: Run tests in parallel threads (race detection)
        run: |
          source .venv/bin/activate
          python -m pytest test/ -v --parallel-threads=4 --iterations=3 -p no:faulthandler -o faulthandler_timeout=600

  test_tsan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libopenblas-dev libssl-dev zlib1g-dev \
            libbz2-dev libreadline-dev libsqlite3-dev libncurses5-dev \
            libncursesw5-dev xz-utils libffi-dev liblzma-dev

      - name: Cache CPython TSan build
        id: cache-cpython
        uses: actions/cache@v4
        with:
          path: cpython-tsan
          key: cpython-tsan-3.14-${{ runner.os }}-v1

      - name: Build CPython 3.14t with Thread Sanitizer
        if: steps.cache-cpython.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 https://github.com/python/cpython.git -b 3.14 cpython-src
          cd cpython-src
          CC=clang CXX=clang++ ./configure --disable-gil --with-thread-sanitizer \
            --prefix $GITHUB_WORKSPACE/cpython-tsan
          make -j$(nproc)
          make install

      - name: Create venv and install dependencies
        run: |
          $GITHUB_WORKSPACE/cpython-tsan/bin/python3.14t -m venv .tsan-venv
          source .tsan-venv/bin/activate
          pip install numpy scipy pytest meson-python meson ninja

      - name: Build and install scs
        run: |
          source .tsan-venv/bin/activate
          pip install -v . --no-build-isolation
        env:
          CC: clang
          CFLAGS: "-fsanitize=thread -g"

      - name: Run tests under TSan
        run: |
          source .tsan-venv/bin/activate
          python -m pytest test/ -v -s
        env:
          TSAN_OPTIONS: "halt_on_error=1 allocator_may_return_null=1 suppressions=${{ github.workspace }}/tsan-suppressions.txt"

      - name: Run threading stress tests under TSan
        run: |
          source .tsan-venv/bin/activate
          python -m pytest test/test_free_threading.py test/test_thread_safety.py -v -s
        env:
          TSAN_OPTIONS: "halt_on_error=1 allocator_may_return_null=1 suppressions=${{ github.workspace }}/tsan-suppressions.txt"
